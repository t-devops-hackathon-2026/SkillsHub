# SkillsHub 設計書（総括）

本書は SkillsHub 全体の設計をまとめた総括ドキュメントである。段階リリースの各ステップで何を作るかは、以下の個別仕様書を参照する。

- [Step 1: Skill を集めて探せる・重複と陳腐化に気づける](../step1/step1.md)
- [Step 2: Skill の改善提案（diff）を受け取れる](../step2/step2.md)
- [Step 3: 利用状況と品質スコアで Skill の価値を測れる](../step3/step3.md)

各仕様書は Markdown 版と HTML 版（ブラウザで開ける仕様書）を併設しており、HTML はリポジトリルートの `python3 build_design_html.py` で Markdown から再生成できる。

---

## 概要

SkillsHub は、社内に散らばっている AIエージェント用の Skill（`SKILL.md` と、それが参照するスクリプトや関連ファイル一式）を一箇所に集めて検索可能にし、品質と鮮度を継続的にチェックする社内向けダッシュボードである。

中核となるのが司書エージェントで、登録された GitHub の Organization やリポジトリを定期的に自動巡回し、Skill の収集・解析・タグ付け・品質採点・重複検出・改善提案を行う。ユーザー操作を起点とせず、定期実行でカタログを自動的に最新化する点が特徴である（「司書」は本書で一貫してこの収集エージェントを指す）。

利用者の主な操作は次の2つ。

- 開発者: 「やりたいこと」を自然文で入力すると、合致する Skill と使い方が提示される。
- Skill の作者: 作成前に既存の重複を確認でき、公開後は鮮度・品質の指摘と改善 diff を受け取れる。

ダッシュボードはログイン不要の閲覧ツールとして提供する。Skill への要望・議論はソースリポジトリの GitHub issue で行い、需要・人気の可視化は Step 3 の利用回数集計で実現する。

本書は [README.md](../../../README.md)（PRD）を実装レベルに具体化した設計書であり、課題・価値・ユーザーストーリーの詳細は PRD を参照する。

---

## 開発フェーズ

機能を3段階に分けて段階的に実装する。Step 1 を最優先のミニマム目標とする。いずれのステップでもダッシュボードはログイン不要で利用できる。

| Step | テーマ（できること） | 主な内容 | 仕様書 |
|---|---|---|---|
| Step 1 | Skill を集めて探せる・重複と陳腐化に気づける | 司書による自律収集・解析・鮮度判定（コミット経過時間）・重複検出、ダッシュボード一覧/絞り込み/サマリ、自然言語検索、Skill詳細、リポジトリ登録、提案レビュー（重複 merge / 合成 compose / 更新 update） | [step1.md](../step1/step1.md) |
| Step 2 | Skill の改善提案（diff）を受け取れる | 改善 improve（記述内容の分析に基づく diff 改善提案）の追加 | [step2.md](../step2/step2.md) |
| Step 3 | 利用状況と品質スコアで Skill の価値を測れる | hooks オプトインによる利用回数の匿名・非同期収集、品質スコア（3観点採点）、鮮度判定のコミット経過時間＋利用回数の2軸化 | [step3.md](../step3/step3.md) |

方針の整理:

1. Step 1 単体で「散在 Skill を集めて可視化し、重複・陳腐化を自動で指摘し、合成・更新まで提案する」デモが成立する（審査基準①②③④を充足）。
2. Step 2 は Skill 作者向けの体験を厚くする拡張で、改善 diff の提案を加える。
3. Step 3 は判断材料を増やす拡張で、利用回数の収集と品質スコアを加え、鮮度判定を2軸に精緻化する。
4. 提案はアプリ内で完結する（採用/却下はステータス記録。GitHub への反映は作者が手元で行う）。
5. Skill への要望・議論はソースリポジトリの GitHub issue に寄せる（GitHub を見られる人＝その Skill を使える人、という前提が成り立つため自然）。
6. 「要更新」に気づく手段は当面、社内の Slack メンション等の人的声がけで代替する（通知機構は将来拡張）。

## 技術スタック

| レイヤー | 採用技術 | 用途（なぜ使うか） | 備考 |
|---|---|---|---|
| フロントエンド兼アプリ本体 | Streamlit | 一覧・検索・詳細・提案レビューの画面を Python だけで素早く作る。画面と処理を同一プロセスに同居させ構成を最小化 | Python界で最メジャー |
| 共通ロジック | `shared/` Pythonモジュール | DB・AI・GitHub の処理を1か所に集約し、画面と司書バッチで重複なく共有する | HTTP API（FastAPI）は立てず `import` で共有 |
| AIエージェント | Google ADK（Python, `google-adk`） | 収集・解析・重複検出・検索・提案を担うマルチエージェントの土台。ハッカソン必須のGoogle AI技術を充足 | 必須要件②を充足 |
| LLM | Gemini 3.5 Flash（既定）/ 重い推論は Pro 系 | SKILL.md の解析、改善提案・合成提案の生成、検索結果の要約 | Vertex AI 経由。モデルIDは最新世代に追従 |
| 埋め込み | Vertex AI `text-multilingual-embedding-002`（768次元） | Skill 本文と検索クエリをベクトル化し、重複検出と意味検索に使う | 日英混在に対応する多言語モデル |
| データ基盤 | Cloud SQL for PostgreSQL + pgvector | Skill・提案・利用記録の永続化と、ベクトル類似検索を1つのDBで完結させる | 通常データとベクトルを一本化 |
| 実行基盤 | Cloud Run（Streamlit）＋ Cloud Run Jobs（司書バッチ） | 画面はリクエスト課金のサービスで、司書は定期起動のジョブで動かす。サーバー管理不要。ハッカソン必須のGCP実行基盤を充足 | 必須要件①を充足。デプロイ単位は2つ |
| スケジューラ | Cloud Scheduler | 人手なしで司書バッチを定期起動し、自律的な収集ループを成立させる | 自律性の起点 |
| シークレット | Secret Manager | GitHub App の秘密鍵や DB 認証情報をコード外で安全に管理する | 最小権限で参照 |
| 収集元 | GitHub（GitHub App / 登録制） | 登録した Organization 配下の全リポジトリ、または個別 `owner/repo` の `SKILL.md` を走査して収集する | 最小権限の読み取り専用 |

設計上のポイント（審査基準①「エージェントの必然性」）: 主要な処理は司書エージェントが自律的に担う。Cloud Scheduler が定期的に司書を起動し、収集→解析→鮮度判定→重複検出→提案生成を自動実行する。ユーザー操作を起点としない自律ループが中心機能である。

---

## システム構成

全体は2種類の処理で動く。

1. 定期実行のバッチ収集: Cloud Scheduler が毎日決まった時刻に司書バッチ（Cloud Run Jobs）を起動する。司書は GitHub App 経由で登録 Organization / リポジトリを巡回し、`SKILL.md` とそれが参照するスクリプト・関連ファイル一式を取得して、Gemini で解析・提案生成を行い、Vertex AI で本文をベクトル化し、結果（Skill 情報・提案）を Cloud SQL に保存する。ユーザー操作は不要。
2. ユーザー操作への応答: 利用者はブラウザから Streamlit アプリにアクセスする（ログイン不要の閲覧）。一覧・詳細は Cloud SQL を読むだけだが、自然言語検索ではクエリを Vertex AI でベクトル化して近傍検索し、必要に応じて Gemini で合成・改善提案を生成する。

司書バッチと Streamlit は同じ `shared/` モジュールを共有し、鍵類は Secret Manager から取得する。

```mermaid

    end

    subgraph CR["Cloud Run (常時起動サービス)"]
        UI["Streamlit アプリ<br/>画面 + shared/ で頭脳も実行<br/>(検索/合成/改善のオンラインAgent含む)"]
    end

    subgraph Batch["Cloud Run Jobs (自律バッチ)"]
        Lib["司書エージェント (ADK)<br/>収集→解析→重複検出<br/>(shared/ を import)"]
    end

    Sched["Cloud Scheduler<br/>毎日 03:00 JST"]

    subgraph Data["データ層"]
        PG[("Cloud SQL<br/>PostgreSQL + pgvector")]
    end

    subgraph GCP_AI["Vertex AI"]
        Gem["Gemini 3.5 Flash/Pro"]
        Emb["text-multilingual-embedding-002"]
    end

    subgraph Ext["外部"]
        GH["GitHub<br/>(GitHub App 経由)"]
    end

    SM["Secret Manager"]

    Dev -->|"ブラウザでアクセス"| UI
    UI -->|"Skill/提案を読み書き"| PG
    UI -->|"検索の合成・改善を推論"| Gem

> Streamlitとバッチは同じ `shared/` モジュール（DB・AI・GitHub処理）を `import` して使う。両者の間にHTTP API（FastAPI）は置かない。デプロイ対象は「Streamlitサービス」と「司書Job」の2つだけ。

### コンポーネント責務

| コンポーネント | 責務 |
|---|---|
| Streamlit アプリ | 画面描画・ユーザー操作に加え、`shared/` を呼んでDB CRUDとオンライン系エージェント（検索/合成/改善）を同プロセスで実行 |
| `shared/` モジュール | DB・AI・GitHub処理を集約した共通ロジック。StreamlitとバッチがHTTPを介さず直接 `import` |
| 司書バッチ（Cloud Run Jobs） | 自律収集・解析・鮮度判定・重複検出・提案生成（`shared/` を利用） |
| Cloud Scheduler | 司書バッチの定期トリガ（＝自律ループの起点） |
| Cloud SQL + pgvector | Skills本体・埋め込み・提案・利用記録（Step 3）の永続化 |
| Vertex AI | LLM推論（Gemini）と埋め込み生成 |
| GitHub App | 登録リポジトリへの最小権限アクセス |
| Secret Manager | 鍵・認証情報の集中管理 |

## 完全版の画面

Step 3 まで実装し終えた完全版での画面遷移と各画面の仕様を示す。各ステップ時点で画面に何が表示されるかは、それぞれの仕様書の「画面」を参照する。

### 画面遷移（完全版）

```mermaid
flowchart LR
    Dash["① ダッシュボード<br/>一覧/絞り込み/サマリ/利用回数"]
    Search["② 自然言語検索<br/>チャット型"]
    Detail["③ Skill詳細<br/>使い方/スコア内訳/利用状況/提案"]
    Suggest["④ 提案レビュー<br/>重複/改善/合成/更新"]
    Reg["⑤ リポジトリ登録<br/>Org / owner/repo 管理"]

    Dash -->|カード選択| Detail
    Dash -->|上部検索バー| Search
    Dash -->|ナビ| Suggest
    Dash -->|ナビ| Reg
    Search -->|候補カード選択| Detail
    Search -->|合成提案を採用| Suggest
    Detail -->|改善提案を承認| Suggest
    Detail -->|戻る| Dash
    Suggest -->|対象Skillへ| Detail
    Reg -->|今すぐ収集| Dash
```

### 各画面の仕様（完全版）

#### ダッシュボード（一覧）`pages/dashboard.py`
- 上部エージェントバー: 「やりたいこと」を自然文入力 → 検索画面へ遷移し検索実行。
- サマリカード（4枚）: 登録Skills数 / 重複候補数 / 要更新数 / 陳腐化注意数。`shared.services.get_summary()` から取得。
- 絞り込みツールバー: フリーワード、鮮度（new/stale/needs_update）、タグ、ソート（品質スコア/更新日/利用回数）。
- Skillカードグリッド: 鮮度バッジ・品質スコア・利用回数・タグ・作者・取得元リンク。クリックで詳細へ。
- 導線: カード→詳細、検索バー→検索、ナビ→提案レビュー／リポジトリ登録。

#### 自然言語検索（チャット）`pages/search.py`
- チャットUI。ユーザー発話→エージェントが「解析中／横断検索中／照合中」の途中表示→候補（最大3件）を確信度付きで提示。
- 候補が2件以上なら合成ワークフロー提案を併記（例: 議事録要約 → タスク抽出）。
- 各候補に推薦理由（why）を表示。候補カード→詳細、合成提案「採用」→提案レビューに Suggestion 登録。

#### Skill詳細 `pages/detail.py`
- ヘッダ: 鮮度バッジ・品質スコア・タグ・説明・作者・取得元（GitHubリンク）・最終更新。
- 使い方（自動生成）: エージェント生成の利用例。
- 品質スコア内訳: 説明の明確さ / トリガー精度 / 注釈の充実（各バー表示）。
- 利用状況: 利用回数の推移（匿名集計）。
- 提案: 対象 Skill に紐づく open な Suggestion（merge/improve/compose/update。diff 下書き含む）。承認/却下可。
- 議論・要望: 取得元リポジトリの GitHub issue へ誘導するリンクを置く。

#### 提案レビュー `pages/suggestions.py`
- open な Suggestion 一覧（type別バッジ: merge/improve/compose/update）。
- 対象Skillリンク、提案本文、diff（あれば）、採用/却下ボタン。
- 採用時の挙動は各 Step 仕様書の「提案の採用時挙動」を参照。

#### リポジトリ登録 `pages/repos.py`
- 登録済み一覧（Organization または `owner/repo`、最終収集日時・収集Skill数・状態）。
- 新規登録フォーム: Organization 単位（配下の全アクセス可能リポジトリを対象）／個別 `owner/repo`、ブランチ任意。
- 「今すぐ収集」ボタンで当該対象の収集を即時キック（`shared.services.collect_repo(repo_id)`）。

### 状態管理（Streamlit）
- `st.session_state` に `current_view` / `selected_skill_id` / `chat_history` / `filters` を保持。
- 各画面は `shared/` のサービス関数を呼ぶだけで、データの真実はDB側に置く（UIはステートレス寄り）。

## データモデル

完全版（Step 3 まで）の ER 図を示す。各エンティティ・カラムの所属ステップは図の後の注記を参照。

```mermaid
erDiagram
    REPOSITORY ||--o{ SKILL : contains
    SKILL ||--o| SKILL_EMBEDDING : has
    SKILL ||--o{ SUGGESTION_TARGET : referenced_by
    SUGGESTION ||--|{ SUGGESTION_TARGET : targets
    SKILL ||--o{ USAGE_EVENT : logged_in

    REPOSITORY {
        uuid id PK
        string owner
        string repo
        string default_branch
        string install_id "GitHub App installation id"
        timestamptz last_collected_at
        string status "active/error/disabled"
        timestamptz created_at
    }
    SKILL {
        uuid id PK
        uuid repo_id FK
        string name
        text description
        string source_path "repo内のSKILL.mdパス"
        string author "Gitメタデータ由来"
        string tags "string[] 配列"
        text usage "自動生成の使い方"
        timestamptz last_updated "SKILL.md最終コミット日時"
        string update_status "new/stale/needs_update"
        int quality_score "0-100 (Step 3)"
        jsonb quality_breakdown "description/trigger/annotation (Step 3)"
        string content_hash "Skill一式のハッシュ(差分検知)"
        timestamptz created_at
        timestamptz updated_at
    }
    SKILL_EMBEDDING {
        uuid skill_id PK
        vector embedding "vector(768)"
        timestamptz embedded_at
    }
    SUGGESTION {
        uuid id PK
        string type "merge/improve/compose/update"
        text content
        jsonb diff "diff下書き(任意)"
        string status "open/accepted/dismissed"
        float confidence "0-1"
        timestamptz created_at
    }
    SUGGESTION_TARGET {
        uuid suggestion_id FK
        uuid skill_id FK
    }
    USAGE_EVENT {
        uuid id PK
        uuid skill_id FK
        timestamptz used_at "Step3・匿名/回数集計"
    }
```

エンティティ・カラムの所属ステップ:

1. Step 1: `Repository` / `Skill`（`quality_score`・`quality_breakdown` を除く） / `Skill_Embedding` / `Suggestion` / `Suggestion_Target`。
2. Step 2: 新テーブルなし。既存の `Suggestion` に `type='improve'` のレコードが加わる。
3. Step 3: `Usage_Event` を追加し、`Skill` に `quality_score` / `quality_breakdown` カラムを追加する。

> PRDからの差分: 独自の `Comment`・`Vote`・`User` は持たない（要望は GitHub issue、需要は Step 3 の `Usage_Event` で表現する）。`Repository` を追加（登録制収集の単位）、`Skill.usage/content_hash` を追加、`Suggestion` の多対多をブリッジ表 `suggestion_target` で表現（compose型が複数Skillを参照するため）。

## GitHub App 連携

GitHub App を対象 Organization にインストールすることで、Org 全体を走査できる。個別 `owner/repo` だけを対象にしたい場合は、その Org 内で対象リポジトリのみにアクセスを絞ってインストールする（GitHub App は「全リポジトリ」または「選択したリポジトリ」を選べる）。

- 権限（最小）: `Contents: Read-only`、`Metadata: Read-only`。Org 単位のインストールで配下リポジトリへまとめてアクセス。
- 認証フロー: App秘密鍵（Secret Manager）→ JWT生成 → Org の Installation Access Token取得 → API呼び出し。`installation_id` は `repository.install_id` に保持。
- リポジトリ列挙（Org走査の起点）: `GET /installation/repositories` でインストールがアクセス可能な全リポジトリを取得し、登録対象としてループする。新規リポジトリの追加・削除も毎回の列挙で自動追従。
- Skill探索: 各リポジトリで Git Trees API（`recursive=1`）でツリー取得 → `SKILL.md`（大文字小文字許容）を見つけ、その `SKILL.md` が置かれたディレクトリを1つの Skill 単位とみなす。`SKILL.md` 本文に加え、同ディレクトリ配下のスクリプトや関連ファイル（`scripts/`・テンプレート・参照データ等）も Contents API で取得する。
- 作者/更新日: Commits API（Skillディレクトリの `path` を指定した最新コミット）から `author` と `last_commit_at` を取得。
- 差分検知: `content_hash`（`SKILL.md` ＋関連ファイル群をまとめたSHA-256）が前回と同一ならLLM処理をスキップ（コスト・レート対策）。
- レート対策: Org走査はリポジトリ数に比例して呼び出しが増えるため、ETag/Conditional Request、リポジトリ単位の指数バックオフ、並列度の上限設定を行う。失敗時は `repository.status='error'` にして他リポジトリの処理は止めない。

## 非機能要件

| 区分 | 方針 |
|---|---|
| 性能 | 一覧/詳細はDBインデックスで <300ms。検索はベクトル近傍＋LLM要約で数秒許容 |
| コスト | 差分検知でLLM呼び出し最小化。Gemini Flash既定、重い推論のみPro |
| セキュリティ | 鍵はSecret Manager集中管理。GitHub App最小権限。DBはプライベートIP＋Cloud SQL Connector。ダッシュボードはログイン不要の閲覧ツールで、認証口は持たない（Step 3 の利用記録の収集口のみ最小限のキー/トークンで保護） |
| 可観測性 | Cloud Logging構造化ログ、バッチ実行結果（収集数/失敗数）を記録 |
| 信頼性 | バッチはリポジトリ単位で独立。1件失敗が全体を止めない |
| デプロイ | Cloud Build → Cloud Run / Cloud Run Jobs。IaCは任意（Terraform可） |
| 拡張性 | 収集元（org全走査・Slack/Notion）、自動PR、ギャップ分析を後付け可能な疎結合構成 |

## 審査基準への対応

| 審査基準 | 本設計での対応 |
|---|---|
| ① エージェントの必然性（自律性） | Cloud Scheduler起点の司書バッチが人手なしで収集→解析→重複検出→提案を継続。主要機能をエージェントが担う |
| ② 課題へのアプローチ | Skillsの散在・重複・陳腐化という実在課題に、収集と評価で直接対応（PRD参照） |
| ③ ユーザビリティ | ログイン不要で使える。自然言語検索、鮮度バッジ、その場採用できるdiff提案 |
| ④ 実用性・体験価値 | 発見→利用→改善が一画面で循環。重複統合で再発明を防ぎ、合成提案で単体不足を補完 |
| ⑤ 実装力 | Google Cloud一貫（Cloud Run/SQL/Vertex/ADK）、疎結合で拡張余地明示、最小権限・差分検知など実運用配慮 |

const apply=()=>{const s=stage.querySelector('svg'); if(s)s.style.transform='scale('+scale+')';};
function openLB(svg){
  stage.innerHTML='';
  const c=svg.cloneNode(true);
  const vbW=(svg.viewBox&&svg.viewBox.baseVal&&svg.viewBox.baseVal.width)||svg.getBoundingClientRect().width||800;
  c.removeAttribute('width'); c.removeAttribute('height');
  c.style.maxWidth='none'; c.style.height='auto'; c.style.width=Math.round(vbW)+'px';
  stage.appendChild(c); scale=1; apply(); lb.classList.add('open');
}
const closeLB=()=>lb.classList.remove('open');
zin.onclick=()=>{scale=Math.min(scale*1.25,6);apply();};
zout.onclick=()=>{scale=Math.max(scale/1.25,0.4);apply();};
zreset.onclick=()=>{scale=1;apply();};
lbclose.onclick=closeLB;
lb.addEventListener('click',e=>{if(e.target===lb||e.target===stage)closeLB();});
