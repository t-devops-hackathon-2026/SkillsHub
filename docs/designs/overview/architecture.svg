<svg viewBox="0 0 880 495" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#14213d" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0969da"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e36209"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8c959f"/>
    </marker>
    <marker id="arrowMini" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#bc4c00"/>
    </marker>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0969da"/>
      <stop offset="1" stop-color="#8250df"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="880" height="495" fill="#f6f8fa"/>

  <!-- タイトル -->
  <text x="24" y="30" font-size="17" font-weight="800" fill="url(#titleGrad)">SkillsHub システム構成図</text>
  <text x="24" y="48" font-size="9.5" fill="#57606a">社内の Skills を自動で集めて探せるダッシュボード ── 司書バッチと Streamlit アプリの2つで動く</text>

  <!-- ===== Google Cloud フレーム ===== -->
  <rect x="190" y="62" width="508" height="392" rx="10" fill="#ffffff" stroke="#d0d7de" filter="url(#shadow)"/>
  <g transform="translate(206,74)">
    <circle cx="3.5" cy="3.5" r="3" fill="#4285f4"/><circle cx="10.5" cy="3.5" r="3" fill="#ea4335"/>
    <circle cx="3.5" cy="10.5" r="3" fill="#fbbc04"/><circle cx="10.5" cy="10.5" r="3" fill="#34a853"/>
    <text x="20" y="11" font-size="10.5" font-weight="700" fill="#1f2328">Google Cloud</text>
  </g>

  <!-- ===== 利用者 ===== -->
  <g>
    <rect x="24" y="240" width="120" height="66" rx="8" fill="#ffffff" stroke="#d0d7de" filter="url(#shadow)"/>
    <circle cx="46" cy="264" r="7" fill="#0969da"/>
    <path d="M35 283 q11 -11 22 0" fill="#0969da"/>
    <text x="62" y="262" font-size="10" font-weight="700" fill="#1f2328">利用者</text>
    <text x="62" y="275" font-size="7.5" fill="#57606a">開発者 / Skills 作者</text>
    <text x="36" y="298" font-size="7.5" fill="#57606a">ブラウザからアクセス</text>
  </g>

  <!-- ===== GitHub ===== -->
  <g>
    <rect x="726" y="96" width="130" height="76" rx="8" fill="#ffffff" stroke="#d0d7de" filter="url(#shadow)"/>
    <g transform="translate(740,108) scale(1.15)">
      <path fill="#1f2328" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
    </g>
    <text x="764" y="119" font-size="10" font-weight="700" fill="#1f2328">GitHub</text>
    <text x="764" y="131" font-size="7.5" fill="#57606a">社内リポジトリ群</text>
    <text x="738" y="150" font-size="7.5" fill="#57606a">GitHub App で</text>
    <text x="738" y="161" font-size="7.5" fill="#57606a">最小権限アクセス</text>
  </g>

  <!-- ===== Cloud Scheduler ===== -->
  <g>
    <rect x="210" y="94" width="132" height="58" rx="8" fill="#fff8f2" stroke="#e36209"/>
    <circle cx="230" cy="116" r="9" fill="none" stroke="#e36209" stroke-width="2"/>
    <path d="M230 110 v6 l4.5 3" fill="none" stroke="#e36209" stroke-width="2" stroke-linecap="round"/>
    <text x="246" y="113" font-size="10" font-weight="700" fill="#1f2328">Cloud Scheduler</text>
    <text x="246" y="126" font-size="7.5" fill="#57606a">毎日 03:00 JST</text>
    <text x="222" y="143" font-size="7.5" fill="#953800" font-weight="600">自律ループの起点</text>
  </g>

  <!-- ===== Cloud Run Jobs（司書） ===== -->
  <g>
    <rect x="386" y="82" width="304" height="116" rx="8" fill="#ffffff" stroke="#d0d7de" filter="url(#shadow)"/>
    <rect x="386" y="82" width="304" height="4" rx="2" fill="#e36209"/>
    <rect x="400" y="96" width="24" height="24" rx="6" fill="#fff1e5"/>
    <path d="M408 102 l9 6 -9 6 z" fill="#e36209"/>
    <text x="432" y="106" font-size="10.5" font-weight="700" fill="#1f2328">Cloud Run Jobs</text>
    <text x="432" y="119" font-size="8.5" fill="#1f2328">司書エージェント（ADK）</text>
    <text x="400" y="139" font-size="7.5" fill="#57606a">SKILL.md 一式を巡回し、解析から改善提案の生成まで自動で実行</text>
    <!-- Agent パイプライン -->
    <rect x="400" y="150" width="84" height="24" rx="12" fill="#fff1e5" stroke="#f4b990"/>
    <text x="442" y="162" font-size="7.5" font-weight="700" fill="#953800" text-anchor="middle">Collector Agent</text>
    <text x="442" y="171" font-size="6.5" fill="#953800" text-anchor="middle">Skills の収集</text>
    <path d="M488 162 H498" stroke="#bc4c00" stroke-width="1.5" marker-end="url(#arrowMini)" fill="none"/>
    <rect x="502" y="150" width="84" height="24" rx="12" fill="#fff1e5" stroke="#f4b990"/>
    <text x="544" y="162" font-size="7.5" font-weight="700" fill="#953800" text-anchor="middle">Analyzer Agent</text>
    <text x="544" y="171" font-size="6.5" fill="#953800" text-anchor="middle">解析・鮮度判定</text>
    <path d="M590 162 H600" stroke="#bc4c00" stroke-width="1.5" marker-end="url(#arrowMini)" fill="none"/>
    <rect x="604" y="150" width="76" height="24" rx="12" fill="#fff1e5" stroke="#f4b990"/>
    <text x="642" y="162" font-size="7.5" font-weight="700" fill="#953800" text-anchor="middle">Deduper Agent</text>
    <text x="642" y="171" font-size="6.5" fill="#953800" text-anchor="middle">重複検出</text>
  </g>

  <!-- ===== Cloud Run Service（Streamlit） ===== -->
  <g>
    <rect x="210" y="240" width="240" height="112" rx="8" fill="#ffffff" stroke="#d0d7de" filter="url(#shadow)"/>
    <rect x="210" y="240" width="240" height="4" rx="2" fill="#0969da"/>
    <rect x="224" y="254" width="24" height="24" rx="6" fill="#ddf4ff"/>
    <path d="M232 260 l9 6 -9 6 z" fill="#0969da"/>
    <text x="256" y="264" font-size="10.5" font-weight="700" fill="#1f2328">Cloud Run Service</text>
    <text x="256" y="277" font-size="8.5" fill="#1f2328">Streamlit アプリ</text>
    <text x="224" y="297" font-size="7.5" fill="#57606a">一覧・検索・提案レビュー画面と</text>
    <text x="224" y="308" font-size="7.5" fill="#57606a">オンライン Agent を同プロセスで実行</text>
    <!-- オンライン Agent -->
    <rect x="224" y="318" width="100" height="24" rx="12" fill="#ddf4ff" stroke="#9cd0f7"/>
    <text x="274" y="330" font-size="7.5" font-weight="700" fill="#0550ae" text-anchor="middle">Searcher Agent</text>
    <text x="274" y="339" font-size="6.5" fill="#0550ae" text-anchor="middle">自然言語検索</text>
    <rect x="332" y="318" width="104" height="24" rx="12" fill="#ddf4ff" stroke="#9cd0f7"/>
    <text x="384" y="330" font-size="7.5" font-weight="700" fill="#0550ae" text-anchor="middle">Composer Agent</text>
    <text x="384" y="339" font-size="6.5" fill="#0550ae" text-anchor="middle">Skills 組み合わせ提案</text>
  </g>

  <!-- ===== Gemini API ===== -->
  <g>
    <rect x="498" y="252" width="180" height="100" rx="8" fill="#ffffff" stroke="#d0d7de" filter="url(#shadow)"/>
    <rect x="498" y="252" width="180" height="4" rx="2" fill="#8250df"/>
    <g transform="translate(512,266)">
      <path d="M10 0 l2.3 7 7 2.3 -7 2.3 -2.3 7 -2.3 -7 -7 -2.3 7 -2.3 z" fill="#8250df"/>
    </g>
    <text x="540" y="277" font-size="10.5" font-weight="700" fill="#1f2328">Gemini API</text>
    <text x="540" y="289" font-size="7.5" fill="#57606a">LLM 推論と埋め込み生成</text>
    <rect x="512" y="300" width="152" height="20" rx="10" fill="#fbefff" stroke="#e2c5f8"/>
    <text x="588" y="313" font-size="7.5" fill="#8250df" text-anchor="middle" font-weight="600">Gemini（推論・生成）</text>
    <rect x="512" y="326" width="152" height="20" rx="10" fill="#fbefff" stroke="#e2c5f8"/>
    <text x="588" y="339" font-size="7.5" fill="#8250df" text-anchor="middle" font-weight="600">Embeddings（ベクトル化）</text>
  </g>

  <!-- ===== Cloud SQL ===== -->
  <g>
    <rect x="240" y="386" width="212" height="56" rx="8" fill="#ffffff" stroke="#d0d7de" filter="url(#shadow)"/>
    <rect x="240" y="386" width="212" height="4" rx="2" fill="#1a7f37"/>
    <g transform="translate(254,400)">
      <path d="M0 4 a10 4 0 0 1 20 0 v14 a10 4 0 0 1 -20 0 z" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5"/>
      <ellipse cx="10" cy="4" rx="10" ry="4" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5"/>
    </g>
    <text x="284" y="408" font-size="10" font-weight="700" fill="#1f2328">Cloud SQL</text>
    <text x="284" y="420" font-size="7.5" fill="#1f2328">PostgreSQL + pgvector</text>
    <text x="284" y="432" font-size="7" fill="#57606a">Skills・埋め込み・改善提案を保存</text>
  </g>

  <!-- ===== Secret Manager ===== -->
  <g>
    <rect x="522" y="390" width="166" height="50" rx="8" fill="#fbfcfe" stroke="#8c959f" stroke-dasharray="4 3"/>
    <g transform="translate(536,404)">
      <circle cx="6" cy="6" r="5" fill="none" stroke="#57606a" stroke-width="1.8"/>
      <path d="M10 10 l9 9 M15 15 l3.5 -3.5 M18 18 l3.5 -3.5" stroke="#57606a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    </g>
    <text x="566" y="412" font-size="10" font-weight="700" fill="#1f2328">Secret Manager</text>
    <text x="566" y="425" font-size="7.5" fill="#57606a">鍵・認証情報の管理</text>
  </g>

  <!-- ===== フロー: 自動収集（オレンジ） ===== -->
  <g stroke="#e36209" stroke-width="1.8" fill="none">
    <path d="M342 121 H382" marker-end="url(#arrowOrange)"/>
    <path d="M690 121 H722" marker-end="url(#arrowOrange)"/>
    <path d="M593 198 V248" marker-end="url(#arrowOrange)"/>
    <path d="M478 198 C478 270 466 340 424 382" marker-end="url(#arrowOrange)"/>
  </g>
  <g font-size="8" fill="#953800" font-weight="600" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round">
    <text x="362" y="113" text-anchor="middle">① 起動</text>
    <text x="706" y="112" text-anchor="middle">② Skills 収集</text>
    <text x="599" y="226" text-anchor="start">③ 解析・埋め込み</text>
    <text x="452" y="345" text-anchor="start">④ 保存</text>
  </g>

  <!-- ===== フロー: ユーザー操作（ブルー） ===== -->
  <g stroke="#0969da" stroke-width="1.8" fill="none">
    <path d="M144 272 H206" marker-end="url(#arrowBlue)"/>
    <path d="M316 352 C320 364 324 372 330 382" marker-end="url(#arrowBlue)"/>
    <path d="M450 288 H494" marker-end="url(#arrowBlue)"/>
  </g>
  <g font-size="8" fill="#0550ae" font-weight="600" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round">
    <text x="175" y="264" text-anchor="middle">⑤ HTTPS</text>
    <text x="308" y="372" text-anchor="end">⑥ 閲覧・検索</text>
    <text x="472" y="280" text-anchor="middle">⑦ 検索の推論</text>
  </g>

  <!-- ===== Secret Manager 参照（グレー破線） ===== -->
  <g stroke="#8c959f" stroke-width="1.2" fill="none" stroke-dasharray="4 3">
    <path d="M430 352 C468 372 500 380 528 388" marker-end="url(#arrowGray)"/>
    <path d="M684 198 C694 260 692 330 646 386" marker-end="url(#arrowGray)"/>
  </g>
  <text x="452" y="376" font-size="7" fill="#57606a" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round">認証情報を参照</text>

  <!-- ===== 凡例 ===== -->
  <g transform="translate(24,462)">
    <rect x="0" y="0" width="292" height="24" rx="6" fill="#ffffff" stroke="#d0d7de"/>
    <line x1="12" y1="12" x2="34" y2="12" stroke="#e36209" stroke-width="1.8" marker-end="url(#arrowOrange)"/>
    <text x="40" y="15" font-size="8" fill="#1f2328">毎日の自動 Skills 収集</text>
    <line x1="160" y1="12" x2="182" y2="12" stroke="#0969da" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
    <text x="188" y="15" font-size="8" fill="#1f2328">ユーザー操作への応答</text>
  </g>
</svg>
