# Step 2 仕様書: Skill の改善提案（diff）を受け取れる

全体像は [総括](../overview/overview.md)、前提となる機能は [Step 1 仕様書](../step1/step1.md) を参照。本書は Step 2 で追加する範囲だけを定義する。

この仕様の動作デモ: [demos/step2/demo.html](../../../demos/step2/demo.html)（ブラウザで開ける。Step 間はデモ右上のリンクで行き来できる）

## このステップでできること

Step 1 の全機能に加えて、次ができるようになる。

1. Skill 作者が、自分の Skill に対する改善提案（improve）を diff 付きで受け取れる。
2. 改善提案は SKILL.md の記述内容の分析（説明の曖昧さ・トリガー記述の不足・入出力例や前提の欠落など）に基づいて生成される。
3. 提案レビュー画面・Skill 詳細画面で improve 提案を確認し、採用/却下を記録できる。

> 改善観点の定量化（品質スコアとしての採点・可視化）は Step 3 で行う。Step 2 では観点ごとの指摘と修正 diff の提示にフォーカスする。

## 追加するもの / 変更するもの

| 区分 | 内容 |
|---|---|
| エージェント | `ImproverAgent` を追加（オンライン系、`output_schema` で diff を構造化出力、モデルは Pro 系） |
| 画面: Skill詳細 | 「改善提案を依頼」ボタンと improve 提案の表示・承認/却下を追加 |
| 画面: 提案レビュー | type バッジに `improve` が加わる（一覧・diff 表示・採用/却下の仕組みは Step 1 のまま） |
| データモデル | 新テーブルなし。既存 `Suggestion` に `type='improve'` のレコードが加わる |

## 画面遷移（Step 2 時点）

Step 1 の遷移に、Skill 詳細から改善提案を起こす導線が加わる。

```mermaid
flowchart LR
    Dash["① ダッシュボード"]
    Search["② 自然言語検索"]
    Detail["③ Skill詳細<br/>使い方/鮮度/提案<br/>+ 改善提案の依頼・表示"]
    Suggest["④ 提案レビュー<br/>重複/合成/更新 + 改善"]
    Reg["⑤ リポジトリ登録"]

    Dash -->|カード選択| Detail
    Dash -->|上部検索バー| Search
    Dash -->|ナビ| Suggest
    Dash -->|ナビ| Reg
    Search -->|候補カード選択| Detail
    Search -->|合成提案を採用| Suggest
    Detail -->|改善提案を承認| Suggest
    Detail -->|戻る| Dash
    Suggest -->|対象Skillへ| Detail
    Reg -->|今すぐ収集| Dash
```

## シーケンス（追加分）

### 改善提案の生成（ユーザー操作起点）

```mermaid
sequenceDiagram
    participant UI as Skill詳細画面
    participant SVC as shared.services.request_improve
    participant IM as Improver(ADK)
    participant Gem as Gemini Pro
    participant DB as Cloud SQL

    UI->>SVC: request_improve(skill_id)
    SVC->>DB: Skill本文・関連ファイルを取得
    SVC->>IM: run(skill一式)
    IM->>Gem: 記述内容を分析し改善diffを生成
    Gem-->>IM: 指摘 + diff(構造化)
    IM-->>SVC: improve提案
    SVC->>DB: SUGGESTION(type='improve')に登録
    SVC-->>UI: 提案を表示(承認/却下可)
```

## アルゴリズム仕様（追加分）

### 改善提案（improve）

- 分析観点（Step 1 の解析・Step 3 の採点と共通の3観点）:
  1. 説明の明確さ: 何をする Skill か一読で分かるか。
  2. トリガー精度: 「いつ使うか」の記述が具体的か。
  3. 注釈の充実: 入出力例・前提・制約の記載があるか。
- 観点ごとの指摘と、SKILL.md への具体的な修正 diff をセットで生成する。
- diff は `Suggestion.diff`（jsonb）に下書きとして保存し、提案レビュー画面で表示する。

### 提案の採用時挙動

- `improve`: ステータスを `accepted` に更新する（記録のみ。実コミットは作者が手元で実施）。監査用の履歴は Step 1 と同じ（種別・対象・日時）。

<script>
const md = document.getElementById('md').textContent;
const content = document.getElementById('content');
content.innerHTML = marked.parse(md, {gfm:true, breaks:false});

// 仕様書間のリンクは .md と .html を併設しているので HTML 側へ付け替える
content.querySelectorAll('a[href]').forEach(a=>{
  const h=a.getAttribute('href');
  if(h && !/^https?:/.test(h) && /\.md(#|$)/.test(h)) a.setAttribute('href', h.replace(/\.md(#|$)/, '.html$1'));
});
document.querySelectorAll('aside .docs a').forEach(a=>{
  if(a.dataset.doc==='step2') a.classList.add('current');
});

const lb=document.getElementById('lb'), stage=document.getElementById('stage');
let scale=1;
const apply=()=>{const s=stage.querySelector('svg'); if(s)s.style.transform='scale('+scale+')';};
function openLB(svg){
  stage.innerHTML='';
  const c=svg.cloneNode(true);
  const vbW=(svg.viewBox&&svg.viewBox.baseVal&&svg.viewBox.baseVal.width)||svg.getBoundingClientRect().width||800;
  c.removeAttribute('width'); c.removeAttribute('height');
  c.style.maxWidth='none'; c.style.height='auto'; c.style.width=Math.round(vbW)+'px';
  stage.appendChild(c); scale=1; apply(); lb.classList.add('open');
}
const closeLB=()=>lb.classList.remove('open');
zin.onclick=()=>{scale=Math.min(scale*1.25,6);apply();};
zout.onclick=()=>{scale=Math.max(scale/1.25,0.4);apply();};
zreset.onclick=()=>{scale=1;apply();};
lbclose.onclick=closeLB;
lb.addEventListener('click',e=>{if(e.target===lb||e.target===stage)closeLB();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

content.querySelectorAll('code.language-mermaid').forEach(el=>{
  const pre=document.createElement('pre'); pre.className='mermaid'; pre.textContent=el.textContent;
  pre.addEventListener('click',()=>{const svg=pre.querySelector('svg'); if(svg)openLB(svg);});
  el.parentElement.replaceWith(pre);
});
mermaid.initialize({startOnLoad:false, theme:'neutral', securityLevel:'loose',
  flowchart:{useMaxWidth:true, htmlLabels:true, padding:16},
  sequence:{useMaxWidth:true},
  themeVariables:{fontSize:'18px'}});
mermaid.run({querySelector:'.mermaid'});

const toc=document.getElementById('toc');
const hs=[...content.querySelectorAll('h2')];
hs.forEach((h,i)=>{const id='sec'+i; h.id=id;
  const a=document.createElement('a'); a.href='#'+id; a.textContent=h.textContent; toc.appendChild(a);});
const links=[...toc.querySelectorAll('a')];
hs.forEach(h=>{new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){
  links.forEach(l=>l.classList.toggle('active', l.getAttribute('href')==='#'+e.target.id));}});},
  {rootMargin:'0px 0px -75% 0px'}).observe(h);});
</script>
